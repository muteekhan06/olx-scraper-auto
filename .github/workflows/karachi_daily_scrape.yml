name: OLX Karachi Daily Scraper

on:
  workflow_dispatch:
    inputs:
      areas:
        description: "Comma-separated Karachi area keys, or 'all' for all Karachi areas"
        required: true
        default: "all"
      max_pages:
        description: "Max pages per area"
        required: true
        default: "2"
      max_listings:
        description: "Max listings per area (kept for compatibility)"
        required: true
        default: "15"

jobs:
  scrape-and-update-karachi:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Create Auth Config Files
        # Use single quotes to prevent bash from stripping quotes
        run: |
          mkdir -p config
          echo '${{ secrets.GOOGLE_CLIENT_SECRET }}' > config/client_secret.json
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > config/google_token.json

      - name: Validate Karachi Area Input
        shell: bash
        run: |
          set -euo pipefail
          RAW_AREAS="${{ github.event.inputs.areas }}"
          RAW_AREAS="$(echo "$RAW_AREAS" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"

          if [ -z "$RAW_AREAS" ]; then
            echo "areas input cannot be empty"
            exit 1
          fi

          if [ "$RAW_AREAS" = "all" ] || [ "$RAW_AREAS" = "karachi" ]; then
            echo "LOCATIONS=karachi" >> "$GITHUB_ENV"
            exit 0
          fi

          ALLOWED="gulshan_iqbal,gulistan_jauhar,fb_area,north_nazimabad,nazimabad,naya_nazimabad,north_karachi,new_karachi,saddar_town,dha_defence_karachi,clifton,buffer_zone_north,buffer_zone_2,khalid_bin_walid"
          SANITIZED=""

          IFS=',' read -ra TOKENS <<< "$RAW_AREAS"
          for key in "${TOKENS[@]}"; do
            if [ -z "$key" ]; then
              continue
            fi
            if [[ ",$ALLOWED," != *",$key,"* ]]; then
              echo "Invalid Karachi area key: $key"
              exit 1
            fi
            if [ -z "$SANITIZED" ]; then
              SANITIZED="$key"
            else
              SANITIZED="$SANITIZED,$key"
            fi
          done

          if [ -z "$SANITIZED" ]; then
            echo "No valid Karachi area keys were provided."
            exit 1
          fi

          echo "LOCATIONS=$SANITIZED" >> "$GITHUB_ENV"

      - name: Run Scraper (Karachi)
        env:
          # Configuration: Karachi Specific
          MAX_PAGES: ${{ github.event.inputs.max_pages }}
          MAX_LISTINGS: ${{ github.event.inputs.max_listings }}
          
          # Secrets - Mapping KARACHI_SHEET_ID secret to GOOGLE_SHEET_ID env var
          GOOGLE_SHEET_ID: ${{ secrets.KARACHI_SHEET_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
          CI: true
        run: |
          python run_batch.py

      - name: Upload Artifacts (Optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output-karachi
          path: output/
          retention-days: 7
