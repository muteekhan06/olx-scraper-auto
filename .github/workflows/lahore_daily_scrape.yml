name: OLX Lahore Daily Scraper

on:
  workflow_dispatch:
    inputs:
      areas:
        description: "Comma-separated Lahore area keys, or 'all' for all Lahore areas"
        required: true
        default: "all"
      max_pages:
        description: "Max pages per area"
        required: true
        default: "2"
      max_listings:
        description: "Max listings per area (kept for compatibility)"
        required: true
        default: "15"
      filter_tokens:
        description: "Optional OLX filter tokens (comma-separated), e.g. price_min_1000000,make_eq_toyota"
        required: false
        default: ""
      custom_search_url:
        description: "Optional full OLX cars URL (overrides area selection), e.g. https://www.olx.com.pk/johar-town_g5000042/cars_c84?filter=price_min_1000000"
        required: false
        default: ""

jobs:
  scrape-and-update-lahore:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Create Auth Config Files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p config
          if [ -n "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > config/service_account.json
            echo "Using Google service account credentials."
          else
            if [ -n "${{ secrets.GOOGLE_CLIENT_SECRET }}" ]; then
              echo '${{ secrets.GOOGLE_CLIENT_SECRET }}' > config/client_secret.json
            fi
            if [ -n "${{ secrets.GOOGLE_TOKEN_JSON }}" ]; then
              echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > config/google_token.json
            fi
            echo "Using legacy Google OAuth credentials."
          fi

      - name: Validate Lahore Area Input
        shell: bash
        run: |
          set -euo pipefail
          RAW_CUSTOM_URL="$(printf '%s' "${{ github.event.inputs.custom_search_url }}" | tr -d '\r')"
          RAW_FILTERS="$(printf '%s' "${{ github.event.inputs.filter_tokens }}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"

          if [ -n "$RAW_FILTERS" ]; then
            if [[ ! "$RAW_FILTERS" =~ ^[a-z0-9,_-]+$ ]]; then
              echo "Invalid filter_tokens format. Use comma-separated tokens only."
              exit 1
            fi
          fi
          echo "FILTER_TOKENS=$RAW_FILTERS" >> "$GITHUB_ENV"

          if [ -n "$RAW_CUSTOM_URL" ]; then
            if [[ "$RAW_CUSTOM_URL" != https://www.olx.com.pk/*/cars_c84* ]]; then
              echo "Invalid custom_search_url. Must point to www.olx.com.pk/*/cars_c84"
              exit 1
            fi
            echo "CUSTOM_SEARCH_URL=$RAW_CUSTOM_URL" >> "$GITHUB_ENV"
            echo "LOCATIONS=lahore" >> "$GITHUB_ENV"
            exit 0
          fi

          RAW_AREAS="$(printf '%s' "${{ github.event.inputs.areas }}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          if [ -z "$RAW_AREAS" ]; then
            echo "areas input cannot be empty when custom_search_url is not set"
            exit 1
          fi

          if [ "$RAW_AREAS" = "all" ] || [ "$RAW_AREAS" = "lahore" ]; then
            echo "LOCATIONS=lahore" >> "$GITHUB_ENV"
            echo "CUSTOM_SEARCH_URL=" >> "$GITHUB_ENV"
            exit 0
          fi
          
          ALLOWED="dha_defence,johar_town,allama_iqbal_town,gulberg,bahria_town,cantt,model_town,sabzazar,township,wapda_town,samanabad,faisal_town,gulshan_e_ravi,gt_road,shahdara,askari,valencia_town,raiwind_road,shadbagh,jail_road,al_rehman_garden,mughalpura,park_view_villas,thokar_niaz_baig,bahria_orchard,baghbanpura,pak_arab_housing,marghzar_officers,harbanspura,central_park,chungi_amar_sadhu,gajju_matah,garden_town,daroghewala,ferozepur_road,tajpura,lda_avenue,walton_road,maulana_shaukat_ali_road,taj_bagh"
          SANITIZED=""

          IFS=',' read -ra TOKENS <<< "$RAW_AREAS"
          for key in "${TOKENS[@]}"; do
            if [ -z "$key" ]; then
              continue
            fi
            if [[ ",$ALLOWED," != *",$key,"* ]]; then
              echo "Invalid Lahore area key: $key"
              exit 1
            fi
            if [ -z "$SANITIZED" ]; then
              SANITIZED="$key"
            else
              SANITIZED="$SANITIZED,$key"
            fi
          done

          if [ -z "$SANITIZED" ]; then
            echo "No valid Lahore area keys were provided."
            exit 1
          fi

          echo "LOCATIONS=$SANITIZED" >> "$GITHUB_ENV"
          echo "CUSTOM_SEARCH_URL=" >> "$GITHUB_ENV"

      - name: Run Scraper (Lahore)
        env:
          MAX_PAGES: ${{ github.event.inputs.max_pages }}
          MAX_LISTINGS: ${{ github.event.inputs.max_listings }}
          FILTER_TOKENS: ${{ env.FILTER_TOKENS }}
          CUSTOM_SEARCH_URL: ${{ env.CUSTOM_SEARCH_URL }}
          
          GOOGLE_SHEET_ID: ${{ secrets.LAHORE_SHEET_ID || secrets.GOOGLE_SHEET_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
          CI: true
        run: |
          python run_batch.py

      - name: Upload Artifacts (Optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output-lahore
          path: output/
          retention-days: 7

      - name: Upload XLSX Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-xlsx-lahore
          path: output/*.xlsx
          if-no-files-found: ignore
          retention-days: 7
