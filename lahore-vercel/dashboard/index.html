<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OLXify — Lahore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0b0d14;
      --bg2:      #10121c;
      --surface:  #161a28;
      --surface2: #1c2134;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.14);
      --text:     #dde3f5;
      --muted:    #5e6a88;
      --muted2:   #8494b8;
      --accent:   #4f7fff;
      --ok:       #34c98e;
      --warn:     #f0a030;
      --err:      #f05066;
      --r:        12px;
      --rs:       8px;
      --rss:      6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ───────────────────────────────────────────── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 54px;
      border-bottom: 1px solid var(--border);
      background: rgba(11,13,20,0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .nav-brand {
      font-size: 15px; font-weight: 800; letter-spacing: -0.03em;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(79,127,255,0.6);
    }
    .nav-pill {
      font-size: 11px; font-weight: 600; color: var(--muted2);
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 999px; padding: 3px 10px; letter-spacing: 0.01em;
    }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-user  { font-size: 12px; color: var(--muted); font-weight: 500; }

    /* ── Buttons ───────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border: 0; border-radius: var(--rs);
      padding: 9px 16px;
      font: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.14s ease; white-space: nowrap;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6090ff; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(79,127,255,0.35); }
    .btn-ghost {
      background: transparent; color: var(--muted2);
      border: 1px solid var(--border2);
      padding: 6px 12px; font-size: 12px; font-weight: 600;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.25); color: var(--text); background: rgba(255,255,255,0.04); }
    .btn-danger {
      background: transparent; color: var(--err);
      border: 1px solid rgba(240,80,102,0.3);
      padding: 6px 12px; font-size: 12px;
    }
    .btn-danger:hover { background: rgba(240,80,102,0.1); }
    .btn-run {
      width: 100%; padding: 14px;
      font: inherit; font-size: 14px; font-weight: 700; letter-spacing: -0.01em;
      background: linear-gradient(135deg, #4f7fff 0%, #6a5fff 100%);
      color: #fff; border-radius: var(--r); border: 0; cursor: pointer;
      transition: all 0.18s ease; position: relative; overflow: hidden;
    }
    .btn-run::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg,rgba(255,255,255,0.14) 0%,transparent 55%);
      pointer-events: none;
    }
    .btn-run:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(79,127,255,0.42);
    }
    .btn-run:active:not(:disabled) { transform: translateY(0); }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-run:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    /* ── Auth ──────────────────────────────────────────── */
    .auth-screen {
      min-height: calc(100vh - 54px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px 32px;
      width: 100%; max-width: 360px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      animation: fadeUp 0.3s ease both;
    }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .auth-logo-icon {
      width: 34px; height: 34px; border-radius: 9px;
      background: linear-gradient(135deg,#4f7fff,#6a5fff);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900; color: #fff;
      box-shadow: 0 4px 14px rgba(79,127,255,0.35);
    }
    .auth-logo-name { font-size: 18px; font-weight: 800; letter-spacing: -0.04em; }
    .auth-title { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .auth-sub   { font-size: 13px; color: var(--muted); margin-bottom: 26px; line-height: 1.5; }

    /* ── Form elements ─────────────────────────────────── */
    .field { margin-bottom: 14px; }
    .field-label {
      display: block;
      font-size: 11px; font-weight: 700; color: var(--muted2);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"], input[type="number"] {
      width: 100%;
      background: var(--bg2); border: 1px solid var(--border2);
      color: var(--text); border-radius: var(--rs);
      padding: 10px 13px; font: inherit; font-size: 14px;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,127,255,0.2); }

    /* ── Page layout ───────────────────────────────────── */
    .page { max-width: 1380px; margin: 0 auto; padding: 20px 16px 40px; }
    .layout {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 16px;
      align-items: start;
    }

    /* ── Panel ─────────────────────────────────────────── */
    /* CRITICAL: NO overflow:hidden — it clips absolutely/fixed positioned dropdowns */
    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r);
      animation: fadeUp 0.32s ease both;
    }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      /* Round only the top corners to compensate for no overflow:hidden on panel */
      border-radius: var(--r) var(--r) 0 0;
    }
    .panel-title { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
    .panel-body  { padding: 18px; border-radius: 0 0 var(--r) var(--r); }

    /* ── Section label ─────────────────────────────────── */
    .sec-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted); margin-bottom: 10px;
    }

    /* ── Area grid ─────────────────────────────────────── */
    .area-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .area-controls { display: flex; gap: 6px; }
    .areas-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .area-chip {
      display: flex; align-items: center; gap: 7px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--rss);
      padding: 7px 9px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .area-chip:hover { border-color: var(--border2); background: rgba(255,255,255,0.03); }
    .area-chip input[type="checkbox"] {
      width: 13px; height: 13px;
      accent-color: var(--accent);
      cursor: pointer; margin: 0; flex-shrink: 0;
    }
    .area-chip span { font-size: 11.5px; font-weight: 500; line-height: 1.3; }
    .area-chip:has(input:checked) {
      border-color: rgba(79,127,255,0.45);
      background: rgba(79,127,255,0.08);
    }
    .area-chip:has(input:checked) span { color: #c5d3ff; }

    .hr { height: 1px; background: var(--border); margin: 20px 0; }

    /* ── Price row ─────────────────────────────────────── */
    .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .price-row .field { margin: 0; }

    /* ── 2-col ─────────────────────────────────────────── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── Custom dropdown ───────────────────────────────── */
    /* KEY FIX: menus use position:fixed + JS-calculated coords */
    /* This means they render in viewport layer — never clipped by any parent */
    .dd-wrap { position: relative; }
    .dd-trigger {
      width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px;
      background: var(--bg2); border: 1px solid var(--border2);
      color: var(--text); border-radius: var(--rs);
      padding: 10px 13px; cursor: pointer;
      font: inherit; font-size: 13px; font-weight: 500; text-align: left;
      transition: border-color 0.16s, box-shadow 0.16s;
    }
    .dd-trigger:hover { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.03); }
    .dd-trigger.open { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,127,255,0.18); }
    .dd-trigger:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .dd-inner { display: flex; align-items: center; gap: 7px; min-width: 0; flex: 1; overflow: hidden; }
    .dd-inner > .dd-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dd-arrow { font-size: 9px; color: var(--muted2); transition: transform 0.2s; flex-shrink: 0; }
    .dd-trigger.open .dd-arrow { transform: rotate(180deg); }
    .dd-badge {
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 800;
      padding: 2px 7px; border-radius: 999px; flex-shrink: 0;
      line-height: 1.6;
    }
    /* Menus rendered fixed into body — always on top, never clipped */
    .dd-menu {
      position: fixed;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--rs); z-index: 9999;
      display: flex; flex-direction: column;
      max-height: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
      animation: ddIn 0.14s ease;
    }
    @keyframes ddIn { from { opacity:0; transform:translateY(-6px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    .dd-search-wrap { padding: 9px 9px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .dd-search {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border2);
      color: var(--text); border-radius: var(--rss);
      padding: 7px 10px; font: inherit; font-size: 12.5px;
      transition: border-color 0.16s;
    }
    .dd-search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,127,255,0.18); }
    .dd-list { overflow-y: auto; flex: 1; padding: 5px; }
    .dd-list::-webkit-scrollbar { width: 4px; }
    .dd-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 999px; }
    .dd-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 11px; border-radius: var(--rss);
      cursor: pointer; font-size: 13px; font-weight: 500;
      transition: background 0.1s; user-select: none;
    }
    .dd-item:hover { background: rgba(255,255,255,0.06); }
    .dd-item.active { background: rgba(79,127,255,0.14); }
    .dd-item.active .dd-item-label { color: #c5d3ff; font-weight: 600; }
    .dd-item input {
      width: 14px; height: 14px; accent-color: var(--accent);
      cursor: pointer; margin: 0; flex-shrink: 0; pointer-events: none;
    }
    .color-swatch {
      width: 16px; height: 16px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }
    .dd-empty { padding: 20px 12px; font-size: 12px; color: var(--muted); text-align: center; }

    /* ── Status messages ───────────────────────────────── */
    .msg { font-size: 12.5px; font-weight: 600; margin-top: 11px; min-height: 20px; line-height: 1.45; }
    .msg.ok  { color: var(--ok); }
    .msg.err { color: var(--err); }
    .msg.warn { color: var(--warn); }

    /* ── Runs panel (sticky sidebar) ───────────────────── */
    .runs-panel { position: sticky; top: 70px; }
    .runs-panel .panel { display: flex; flex-direction: column; max-height: calc(100vh - 86px); }
    .runs-body { overflow-y: auto; flex: 1; border-radius: 0 0 var(--r) var(--r); }
    .runs-body::-webkit-scrollbar { width: 4px; }
    .runs-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 999px; }

    /* ── Table ─────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    thead th {
      position: sticky; top: 0; z-index: 2;
      background: var(--surface);
      text-align: left; padding: 11px 13px;
      font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 10px 13px; border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: 0; }
    tr:hover td { background: rgba(255,255,255,0.025); }

    /* ── Run links / download ──────────────────────────── */
    .run-links { display: flex; flex-direction: column; gap: 5px; }
    .run-link {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--accent); text-decoration: none; font-weight: 600;
      font-size: 12px; line-height: 1;
      padding: 4px 0;
      transition: color 0.14s;
    }
    .run-link:hover { color: #8ab0ff; text-decoration: none; }
    .run-link-icon { font-size: 10px; opacity: 0.7; }
    .dl-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(52,201,142,0.1); color: var(--ok);
      border: 1px solid rgba(52,201,142,0.28);
      border-radius: var(--rss); padding: 5px 10px;
      font: inherit; font-size: 11.5px; font-weight: 700;
      text-decoration: none; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
      white-space: nowrap;
    }
    .dl-btn:hover {
      background: rgba(52,201,142,0.2);
      border-color: rgba(52,201,142,0.5);
      transform: translateY(-1px);
      text-decoration: none;
      color: var(--ok);
    }
    .dl-btn:active { transform: translateY(0); }
    .dl-btn-icon { font-size: 11px; }

    /* ── Status dots ───────────────────────────────────── */
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11.5px; font-weight: 600;
      padding: 3px 9px; border-radius: 999px;
    }
    .status-pill.ok     { background: rgba(52,201,142,0.12); color: var(--ok); border: 1px solid rgba(52,201,142,0.25); }
    .status-pill.err    { background: rgba(240,80,102,0.12); color: var(--err); border: 1px solid rgba(240,80,102,0.25); }
    .status-pill.run    { background: rgba(79,127,255,0.12); color: var(--accent); border: 1px solid rgba(79,127,255,0.25); }
    .status-pill.queue  { background: rgba(94,106,136,0.18); color: var(--muted2); border: 1px solid var(--border2); }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok  { background: var(--ok); }
    .dot-err { background: var(--err); }
    .dot-run { background: var(--accent); animation: pulse 1.3s ease-in-out infinite; }
    .dot-q   { background: var(--muted2); }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.85); } }

    /* ── Empty / loading states ────────────────────────── */
    .table-notice {
      padding: 32px 16px; text-align: center;
      color: var(--muted); font-size: 12.5px; line-height: 1.7;
    }
    .table-notice strong { display: block; color: var(--muted2); font-size: 13px; margin-bottom: 4px; }

    /* ── Animations ────────────────────────────────────── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.8s linear infinite; display:inline-block; }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .runs-panel { position: static; }
      .runs-panel .panel { max-height: 440px; }
    }
    @media (max-width: 720px) {
      .areas-grid { grid-template-columns: repeat(3, 1fr); }
      .two-col    { grid-template-columns: 1fr; }
      .price-row  { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .areas-grid { grid-template-columns: repeat(2, 1fr); }
      .auth-card  { padding: 28px 20px; }
      .page       { padding: 14px 12px 32px; }
      .nav        { padding: 0 16px; }
    }
    @media (max-width: 320px) { .areas-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-brand">
    <div class="nav-dot"></div>
    OLXify
    <span class="nav-pill">Lahore</span>
  </div>
  <div class="nav-right" id="navRight" style="display:none">
    <span class="nav-user" id="navUser"></span>
    <button class="btn btn-danger" onclick="logout()">Sign out</button>
  </div>
</nav>

<!-- Auth screen -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">O</div>
      <div class="auth-logo-name">OLXify</div>
    </div>
    <div class="auth-title">Sign in</div>
    <div class="auth-sub">Lahore Scraper Control Panel</div>
    <div class="field">
      <label class="field-label" for="username">Username</label>
      <input id="username" type="text" autocomplete="username" placeholder="admin"
             onkeydown="if(event.key==='Enter') document.getElementById('password').focus()" />
    </div>
    <div class="field">
      <label class="field-label" for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:6px;" id="loginBtn" onclick="login()">
      Continue →
    </button>
    <div id="loginMsg" class="msg" style="text-align:center;margin-top:12px;"></div>
  </div>
</div>

<!-- Main page -->
<div class="page" id="mainPage" style="display:none">
  <div class="layout">

    <!-- Left: Config panel -->
    <div>
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Scrape Configuration</div>
        </div>
        <div class="panel-body">

          <!-- Locations -->
          <div class="area-head">
            <div class="sec-label" style="margin:0">Locations</div>
            <div class="area-controls">
              <button class="btn btn-ghost" onclick="selectAllAreas(true)" title="Select all areas">All</button>
              <button class="btn btn-ghost" onclick="selectAllAreas(false)" title="Clear all areas">None</button>
            </div>
          </div>
          <div id="areasGrid" class="areas-grid"></div>

          <div class="hr"></div>

          <!-- Price -->
          <div class="sec-label">Price Range (PKR)</div>
          <div class="price-row">
            <div class="field">
              <label class="field-label" for="priceMin">Min</label>
              <input id="priceMin" type="number" min="0" step="100000" placeholder="e.g. 1,000,000" />
            </div>
            <div class="field">
              <label class="field-label" for="priceMax">Max</label>
              <input id="priceMax" type="number" min="0" step="100000" placeholder="e.g. 5,000,000" />
            </div>
          </div>

          <div class="hr"></div>

          <!-- Brand + Colour -->
          <div class="two-col">
            <div>
              <div class="sec-label">Brand</div>
              <div class="dd-wrap" id="brandWrap">
                <button class="dd-trigger" id="brandTrigger"
                        onclick="toggleDd('brand')"
                        aria-haspopup="listbox" aria-expanded="false">
                  <div class="dd-inner">
                    <span class="dd-label" id="brandLabel">Any Brand</span>
                  </div>
                  <span class="dd-arrow" aria-hidden="true">▼</span>
                </button>
              </div>
            </div>
            <div>
              <div class="sec-label">Exterior Colour</div>
              <div class="dd-wrap" id="colorWrap">
                <button class="dd-trigger" id="colorTrigger"
                        onclick="toggleDd('color')"
                        aria-haspopup="listbox" aria-expanded="false">
                  <div class="dd-inner">
                    <span class="dd-label" id="colorLabel">Any Colour</span>
                  </div>
                  <span class="dd-arrow" aria-hidden="true">▼</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Shared dropdown menus — rendered here, positioned via JS as fixed -->
          <div class="dd-menu" id="brandMenu" style="display:none" role="listbox">
            <div class="dd-search-wrap">
              <input class="dd-search" type="text" placeholder="Search brands…"
                     id="brandSearch" oninput="filterDd('brand')" autocomplete="off" />
            </div>
            <div class="dd-list" id="brandList"></div>
          </div>

          <div class="dd-menu" id="colorMenu" style="display:none" role="listbox">
            <div class="dd-search-wrap">
              <input class="dd-search" type="text" placeholder="Search colours…"
                     id="colorSearch" oninput="filterDd('color')" autocomplete="off" />
            </div>
            <div class="dd-list" id="colorList"></div>
          </div>

          <div class="hr"></div>

          <button class="btn-run" id="runBtn" onclick="runLahore()">
            Run Lahore Scrape
          </button>
          <div id="runMsg" class="msg"></div>

        </div>
      </div>
    </div>

    <!-- Right: Runs panel -->
    <div class="runs-panel">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Recent Runs</div>
          <button class="btn btn-ghost" id="refreshBtn" onclick="loadRuns(true)"
                  title="Refresh run history">
            <span id="refreshIcon">↻</span> Refresh
          </button>
        </div>
        <div class="runs-body">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="runsTable">
              <tr><td colspan="3">
                <div class="table-notice"><strong>Loading runs…</strong></div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ── Data ────────────────────────────────────────────── */
const BRAND_OPTIONS = [
  ["Toyota","make_eq_toyota"],["Honda","make_eq_cars-honda"],["Suzuki","make_eq_cars-suzuki"],
  ["Nissan","make_eq_nissan"],["Daihatsu","make_eq_daihatsu"],["Hyundai","make_eq_hyundai"],
  ["Changan","make_eq_changan"],["KIA","make_eq_kia"],["MG","make_eq_mg"],
  ["Haval","make_eq_haval"],["Mercedes","make_eq_mercedes"],["Mitsubishi","make_eq_mitsubishi"],
  ["Proton","make_eq_proton"],["Prince","make_eq_prince"],["Subaru","make_eq_subaru"],
  ["Volkswagen","make_eq_volkswagen"],["DFSK","make_eq_dfsk"],["Audi","make_eq_audi"],
  ["Tesla","make_eq_tesla"],["FAW","make_eq_faw"],["Chevrolet","make_eq_chevrolet"],
  ["Isuzu","make_eq_cars-isuzu"],["BMW","make_eq_bmw"],["Chery","make_eq_chery"],
  ["Peugeot","make_eq_peugeot"],["JAC","make_eq_jac"],["Ford","make_eq_ford"],
  ["Range Rover","make_eq_range-rover"],["JW Forland","make_eq_jw-fortland"],
  ["Jaecoo","make_eq_jaecoo"],["Mazda","make_eq_mazda"],["United","make_eq_united"],
  ["BYD","make_eq_byd"],["Lexus","make_eq_lexus"],["Datsun","make_eq_datsun"],
  ["BAIC","make_eq_baic"],["Daewoo","make_eq_daewoo"],["Land Rover","make_eq_land-rover"],
  ["Deepal","make_eq_deepal"],["Jeep","make_eq_jeep"],["Fiat","make_eq_fiat"],
  ["Ssangyong","make_eq_ssangyong"],["Jetour","make_eq_jetour"],["Porsche","make_eq_porsche"],
  ["Cadillac","make_eq_cadillac"],["Seres","make_eq_seres"],["Dongfeng","make_eq_dongfeng"],
  ["Other Brands","make_eq_cars-other"],
];

const COLOR_OPTIONS = [
  ["White","color_eq_white","#f0f0f0"],["Silver","color_eq_silver","#b0b4bc"],
  ["Black","color_eq_black","#1e1e1e"],["Grey","color_eq_grey","#707480"],
  ["Blue","color_eq_blue","#2c6ec8"],["Red","color_eq_red","#d93040"],
  ["Maroon","color_eq_maroon","#7a1020"],["Beige","color_eq_beige","#c8b490"],
  ["Green","color_eq_green","#2a8830"],["Brown","color_eq_brown","#7a3e18"],
  ["Gold","color_eq_gold","#c8a028"],["Indigo","color_eq_indigo","#3c1880"],
  ["Purple","color_eq_purple","#7c28cc"],["Yellow","color_eq_yellow","#e8bc30"],
  ["Turquoise","color_eq_turquoise","#38c0c0"],["Bronze","color_eq_bronze","#9c5c28"],
  ["Burgundy","color_eq_burgundy","#6c1830"],["Magenta","color_eq_magenta","#c02880"],
  ["Navy","color_eq_navy","#0c1e58"],["Orange","color_eq_orange","#dc5800"],
  ["Pink","color_eq_pink","#e078a8"],["Unlisted","color_eq_unlisted","#3a3e48"],
];

let areaData = [];
let selectedBrand = null;
let selectedColors = new Set();
let openDd = null; // tracks which dropdown is open

/* ── Area rendering ──────────────────────────────────── */
function renderAreas() {
  document.getElementById("areasGrid").innerHTML = areaData.map(function(a) {
    return '<label class="area-chip" title="' + a.name + '">'
      + '<input class="area-check" type="checkbox" value="' + a.key + '" checked />'
      + '<span>' + a.name + '</span>'
      + '</label>';
  }).join("");
}
function selectAllAreas(on) {
  document.querySelectorAll(".area-check").forEach(function(x) { x.checked = on; });
}
function areaSelection() {
  return Array.from(document.querySelectorAll(".area-check:checked")).map(function(x) { return x.value; });
}

/* ── Dropdown core — position:fixed menus ────────────── */
function positionMenu(which) {
  var trigId  = which === "brand" ? "brandTrigger" : "colorTrigger";
  var menuId  = which === "brand" ? "brandMenu"    : "colorMenu";
  var trigger = document.getElementById(trigId);
  var menu    = document.getElementById(menuId);
  var rect    = trigger.getBoundingClientRect();
  var vw      = window.innerWidth;
  var vh      = window.innerHeight;

  // Width matches trigger
  var menuW = rect.width;
  menu.style.width = menuW + "px";

  // Default: open below trigger
  var top = rect.bottom + 6;
  // If not enough space below, open above
  var menuH = 300; // max-height
  if (top + menuH > vh - 12 && rect.top > menuH) {
    top = rect.top - menuH - 6;
  }

  var left = rect.left;
  // Prevent overflow right
  if (left + menuW > vw - 10) left = vw - menuW - 10;
  // Prevent overflow left
  if (left < 10) left = 10;

  menu.style.top  = top  + "px";
  menu.style.left = left + "px";
}

function openDdMenu(which) {
  closeDdMenu("brand"); closeDdMenu("color");
  openDd = which;
  var menuId  = which === "brand" ? "brandMenu"    : "colorMenu";
  var trigId  = which === "brand" ? "brandTrigger" : "colorTrigger";
  var menu    = document.getElementById(menuId);
  var trigger = document.getElementById(trigId);

  menu.style.display = "flex";
  positionMenu(which);
  trigger.classList.add("open");
  trigger.setAttribute("aria-expanded", "true");

  if (which === "brand") {
    renderBrandList();
    setTimeout(function() { document.getElementById("brandSearch").focus(); }, 30);
  } else {
    renderColorList();
    setTimeout(function() { document.getElementById("colorSearch").focus(); }, 30);
  }
}

function closeDdMenu(which) {
  var menuId  = which === "brand" ? "brandMenu"    : "colorMenu";
  var trigId  = which === "brand" ? "brandTrigger" : "colorTrigger";
  document.getElementById(menuId).style.display = "none";
  var trig = document.getElementById(trigId);
  trig.classList.remove("open");
  trig.setAttribute("aria-expanded", "false");
  if (openDd === which) openDd = null;
}

function toggleDd(which) {
  var menuId = which === "brand" ? "brandMenu" : "colorMenu";
  var isOpen = document.getElementById(menuId).style.display !== "none";
  if (isOpen) { closeDdMenu(which); } else { openDdMenu(which); }
}

function filterDd(which) {
  var q = document.getElementById(which === "brand" ? "brandSearch" : "colorSearch").value;
  which === "brand" ? renderBrandList(q) : renderColorList(q);
  positionMenu(which); // re-position in case height changed
}

// Close on outside click
document.addEventListener("click", function(e) {
  if (!e.target.closest("#brandWrap") && !e.target.closest("#brandMenu")) closeDdMenu("brand");
  if (!e.target.closest("#colorWrap") && !e.target.closest("#colorMenu")) closeDdMenu("color");
});
// Close + reposition on scroll/resize
window.addEventListener("scroll", function() { closeDdMenu("brand"); closeDdMenu("color"); }, true);
window.addEventListener("resize", function() {
  if (openDd) positionMenu(openDd);
});
// Keyboard close on Escape
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") { closeDdMenu("brand"); closeDdMenu("color"); }
});

/* ── Brand dropdown ──────────────────────────────────── */
function renderBrandList(q) {
  q = (q || "").toLowerCase();
  var items = BRAND_OPTIONS.filter(function(x) { return !q || x[0].toLowerCase().includes(q); });
  var list = document.getElementById("brandList");
  if (!items.length) {
    list.innerHTML = '<div class="dd-empty">No brands match "' + escHtml(q) + '"</div>';
    return;
  }
  list.innerHTML = items.map(function(x) {
    var active = selectedBrand === x[1];
    return '<div class="dd-item' + (active ? " active" : "") + '" role="option"'
      + ' aria-selected="' + active + '"'
      + ' onclick="pickBrand(\'' + x[1] + '\',\'' + x[0].replace(/'/g, "\\'") + '\')">'
      + '<input type="radio" name="brand_r" tabindex="-1"' + (active ? " checked" : "") + ' />'
      + '<span class="dd-item-label">' + escHtml(x[0]) + '</span>'
      + '</div>';
  }).join("");
}
function pickBrand(token, name) {
  selectedBrand = (selectedBrand === token) ? null : token;
  document.getElementById("brandLabel").textContent = selectedBrand ? name : "Any Brand";
  closeDdMenu("brand");
}

/* ── Colour dropdown ─────────────────────────────────── */
function renderColorList(q) {
  q = (q || "").toLowerCase();
  var items = COLOR_OPTIONS.filter(function(x) { return !q || x[0].toLowerCase().includes(q); });
  var list = document.getElementById("colorList");
  if (!items.length) {
    list.innerHTML = '<div class="dd-empty">No colours match "' + escHtml(q) + '"</div>';
    return;
  }
  list.innerHTML = items.map(function(x) {
    var active = selectedColors.has(x[1]);
    return '<div class="dd-item' + (active ? " active" : "") + '" role="option"'
      + ' aria-selected="' + active + '"'
      + ' onclick="toggleColor(\'' + x[1] + '\')">'
      + '<input type="checkbox" tabindex="-1"' + (active ? " checked" : "") + ' />'
      + '<span class="color-swatch" style="background:' + x[2] + '" aria-hidden="true"></span>'
      + '<span class="dd-item-label">' + escHtml(x[0]) + '</span>'
      + '</div>';
  }).join("");
  syncColorLabel();
}
function toggleColor(token) {
  selectedColors.has(token) ? selectedColors.delete(token) : selectedColors.add(token);
  renderColorList(document.getElementById("colorSearch").value);
}
function syncColorLabel() {
  var n = selectedColors.size;
  var label;
  if (n === 0) {
    label = "Any Colour";
  } else if (n === 1) {
    var match = COLOR_OPTIONS.find(function(c) { return selectedColors.has(c[1]); });
    label = match ? match[0] : "1 Colour";
  } else {
    label = n + " Colours";
  }
  document.getElementById("colorLabel").textContent = label;

  var trigger = document.getElementById("colorTrigger");
  var old = trigger.querySelector(".dd-badge");
  if (old) old.remove();
  if (n > 1) {
    var b = document.createElement("span");
    b.className = "dd-badge"; b.textContent = n;
    document.getElementById("colorTrigger").querySelector(".dd-inner").appendChild(b);
  }
}

/* ── Helpers ─────────────────────────────────────────── */
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function buildFilterTokens() {
  var tokens = [];
  var pMin = (document.getElementById("priceMin").value || "").trim();
  var pMax = (document.getElementById("priceMax").value || "").trim();
  if (pMin) tokens.push("price_min_" + pMin);
  if (pMax) tokens.push("price_max_" + pMax);
  if (selectedBrand) tokens.push(selectedBrand);
  if (selectedColors.size) {
    var vals = Array.from(selectedColors).map(function(t) { return t.replace("color_eq_",""); });
    tokens.push("color_eq_" + vals.join("_and_"));
  }
  return tokens.join(",");
}

function setMsg(id, text, type) {
  var el = document.getElementById(id);
  el.textContent = text || "";
  el.className = "msg" + (text ? (" " + (type || "err")) : "");
}

/* ── Auth ────────────────────────────────────────────── */
async function login() {
  setMsg("loginMsg", "", "");
  var btn = document.getElementById("loginBtn");
  btn.disabled = true; btn.textContent = "Signing in…";
  try {
    var r = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      }),
    });
    var d = await r.json();
    if (!r.ok) { setMsg("loginMsg", d.error || "Invalid credentials", "err"); return; }
    await initSession();
  } catch (err) {
    setMsg("loginMsg", "Connection error — please try again", "err");
  } finally {
    btn.disabled = false; btn.textContent = "Continue →";
  }
}

async function logout() {
  try { await fetch("/api/logout", { method: "POST" }); } catch(_) {}
  document.getElementById("mainPage").style.display   = "none";
  document.getElementById("authScreen").style.display = "flex";
  document.getElementById("navRight").style.display   = "none";
  document.getElementById("password").value = "";
}

async function initSession() {
  try {
    var r = await fetch("/api/me");
    if (!r.ok) {
      document.getElementById("authScreen").style.display = "flex";
      document.getElementById("mainPage").style.display   = "none";
      return;
    }
    var d = await r.json();
    areaData = d.lahoreAreas || [];
    renderAreas();
    document.getElementById("navUser").textContent    = d.username;
    document.getElementById("navRight").style.display = "flex";
    document.getElementById("authScreen").style.display = "none";
    document.getElementById("mainPage").style.display   = "block";
    await loadRuns(false);
  } catch (err) {
    document.getElementById("authScreen").style.display = "flex";
    document.getElementById("mainPage").style.display   = "none";
  }
}

/* ── Run scrape ──────────────────────────────────────── */
async function runLahore() {
  setMsg("runMsg", "", "");
  var areas = areaSelection();
  if (!areas.length) {
    setMsg("runMsg", "⚠ Select at least one location to continue", "warn");
    return;
  }
  var btn = document.getElementById("runBtn");
  btn.disabled = true; btn.textContent = "Dispatching…";
  try {
    var r = await fetch("/api/run-lahore", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        areas:           areas,
        maxPages:        2,
        maxListings:     15,
        filterTokens:    buildFilterTokens(),
        customSearchUrl: "",
        githubToken:     "",
      }),
    });
    var d = await r.json();
    if (!r.ok) { setMsg("runMsg", d.error || "Dispatch failed", "err"); return; }
    setMsg("runMsg", "✓ Dispatched — " + areas.length + " location" + (areas.length > 1 ? "s" : ""), "ok");
    setTimeout(function() { loadRuns(false); }, 3000);
  } catch (err) {
    setMsg("runMsg", "Network error — please retry", "err");
  } finally {
    btn.disabled = false; btn.textContent = "Run Lahore Scrape";
  }
}

/* ── Runs table ──────────────────────────────────────── */
function fmtTime(iso) {
  var d = new Date(iso);
  var now = new Date();
  var diffMs = now - d;
  var diffMins = Math.floor(diffMs / 60000);
  if (diffMins < 1)   return "just now";
  if (diffMins < 60)  return diffMins + "m ago";
  if (diffMins < 1440) {
    var h = Math.floor(diffMins / 60);
    var m = diffMins % 60;
    return h + "h" + (m ? " " + m + "m" : "") + " ago";
  }
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" })
       + " " + d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
}

function statusPill(status, conclusion) {
  if (conclusion === "success")
    return '<span class="status-pill ok"><span class="dot dot-ok"></span>Success</span>';
  if (conclusion === "failure" || conclusion === "cancelled")
    return '<span class="status-pill err"><span class="dot dot-err"></span>'
           + (conclusion === "cancelled" ? "Cancelled" : "Failed") + '</span>';
  if (status === "in_progress")
    return '<span class="status-pill run"><span class="dot dot-run"></span>Running…</span>';
  if (status === "queued")
    return '<span class="status-pill queue"><span class="dot dot-q"></span>Queued</span>';
  return '<span class="status-pill queue"><span class="dot dot-q"></span>' + (status || "—") + '</span>';
}

async function loadRuns(showSpinner) {
  var tbody  = document.getElementById("runsTable");
  var refBtn = document.getElementById("refreshBtn");
  var icon   = document.getElementById("refreshIcon");

  if (showSpinner) {
    icon.className = "spinning";
    refBtn.disabled = true;
    tbody.innerHTML = '<tr><td colspan="3"><div class="table-notice">Loading…</div></td></tr>';
  }

  try {
    var r = await fetch("/api/runs", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ githubToken: "" }),
    });
    var d = await r.json();

    if (!r.ok) {
      tbody.innerHTML = '<tr><td colspan="3"><div class="table-notice"><strong>Could not load runs</strong>'
        + escHtml(d.error || "Unknown error") + '</div></td></tr>';
      return;
    }

    var runs = d.runs || [];
    if (!runs.length) {
      tbody.innerHTML = '<tr><td colspan="3"><div class="table-notice">'
        + '<strong>No runs yet</strong>Trigger your first scrape above ↑</div></td></tr>';
      return;
    }

    tbody.innerHTML = runs.map(function(run) {
      var time = fmtTime(run.created_at);
      var pill = statusPill(run.status, run.conclusion);

      // GitHub link (always)
      var actions = '<a class="run-link" href="' + escHtml(run.html_url) + '" '
        + 'target="_blank" rel="noopener noreferrer" title="View run on GitHub">'
        + '<span class="run-link-icon">⎋</span> GitHub'
        + '</a>';

      // XLSX download — prominent green button when available
      if (run.xlsx_available && run.xlsx_download_url) {
        actions += '<a class="dl-btn" href="' + escHtml(run.xlsx_download_url) + '" '
          + 'download title="Download scraped data as Excel file">'
          + '<span class="dl-btn-icon">⬇</span> Download XLSX'
          + '</a>';
      }

      return '<tr>'
        + '<td style="white-space:nowrap;color:var(--muted2);font-size:11.5px;" title="' + escHtml(run.created_at) + '">' + time + '</td>'
        + '<td>' + pill + '</td>'
        + '<td><div class="run-links">' + actions + '</div></td>'
        + '</tr>';
    }).join("");

  } catch (err) {
    tbody.innerHTML = '<tr><td colspan="3"><div class="table-notice"><strong>Network error</strong>'
      + 'Check your connection and refresh</div></td></tr>';
  } finally {
    icon.className = "";
    refBtn.disabled = false;
  }
}

/* ── Boot ─────────────────────────────────────────────── */
initSession();
</script>
</body>
</html>
