<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OLXify — Lahore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0b0d14;
      --bg2:      #10121c;
      --surface:  #161a28;
      --surface2: #1c2134;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.13);
      --text:     #dde3f5;
      --muted:    #5e6a88;
      --muted2:   #8494b8;
      --accent:   #4f7fff;
      --ok:       #34c98e;
      --err:      #f05066;
      --r:        12px;
      --rs:       8px;
      --rss:      6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Nav */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: rgba(11,13,20,0.92);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 300;
    }
    .nav-brand {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(79,127,255,0.5);
    }
    .nav-pill {
      font-size: 11px; font-weight: 600;
      color: var(--muted2);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 999px;
      padding: 3px 9px;
    }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-user  { font-size: 12px; color: var(--muted); font-weight: 500; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border: 0; border-radius: var(--rs);
      padding: 9px 15px;
      font: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all 0.14s ease;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #5e8fff; }
    .btn-ghost {
      background: transparent; color: var(--muted2);
      border: 1px solid var(--border);
      padding: 6px 11px; font-size: 12px;
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--border2); color: var(--text); }
    .btn-danger {
      background: transparent; color: var(--err);
      border: 1px solid rgba(240,80,102,0.28);
      padding: 6px 11px; font-size: 12px;
    }
    .btn-danger:hover:not(:disabled) { background: rgba(240,80,102,0.08); }
    .btn-run {
      width: 100%; padding: 13px;
      font: inherit; font-size: 14px; font-weight: 700; letter-spacing: -0.01em;
      background: linear-gradient(135deg, #4f7fff 0%, #7a6dff 100%);
      color: #fff; border-radius: var(--r); border: 0; cursor: pointer;
      transition: all 0.16s ease;
      position: relative; overflow: hidden;
    }
    .btn-run::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 60%);
      pointer-events: none;
    }
    .btn-run:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(79,127,255,0.38); }
    .btn-run:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Auth */
    .auth-screen {
      min-height: calc(100vh - 52px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px 32px;
      width: 100%; max-width: 360px;
      animation: fadeUp 0.3s ease both;
    }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .auth-logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg,#4f7fff,#7a6dff);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #fff;
    }
    .auth-logo-name { font-size: 17px; font-weight: 800; letter-spacing: -0.03em; }
    .auth-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .auth-sub   { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    /* Form */
    .field { margin-bottom: 14px; }
    .field-label {
      display: block;
      font-size: 11px; font-weight: 700; color: var(--muted2);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"], input[type="number"] {
      width: 100%;
      background: var(--bg2); border: 1px solid var(--border2);
      color: var(--text); border-radius: var(--rs);
      padding: 10px 12px; font: inherit; font-size: 14px;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,127,255,0.18); }

    /* Layout */
    .page { max-width: 1360px; margin: 0 auto; padding: 20px 16px 32px; }
    .layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 14px;
      align-items: start;
    }

    /* Panel */
    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
      animation: fadeUp 0.3s ease both;
    }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
    .panel-body  { padding: 16px; }

    /* Section label */
    .sec-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted); margin-bottom: 10px;
    }

    /* Area grid */
    .area-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .area-controls { display: flex; gap: 6px; }
    .areas-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .area-chip {
      display: flex; align-items: center; gap: 7px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--rss);
      padding: 7px 9px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .area-chip:hover { border-color: var(--border2); }
    .area-chip input[type="checkbox"] {
      width: 13px; height: 13px;
      accent-color: var(--accent);
      cursor: pointer; margin: 0; flex-shrink: 0;
    }
    .area-chip span { font-size: 11.5px; font-weight: 500; line-height: 1.3; }
    .area-chip:has(input:checked) {
      border-color: rgba(79,127,255,0.4);
      background: rgba(79,127,255,0.07);
    }

    .hr { height: 1px; background: var(--border); margin: 18px 0; }

    /* Price row */
    .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .price-row .field { margin: 0; }

    /* 2-col */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Custom dropdown */
    .dd-wrap { position: relative; }
    .dd-trigger {
      width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px;
      background: var(--bg2); border: 1px solid var(--border2);
      color: var(--text); border-radius: var(--rs);
      padding: 10px 12px; cursor: pointer;
      font: inherit; font-size: 13px; font-weight: 500; text-align: left;
      transition: border-color 0.16s;
    }
    .dd-trigger:hover { border-color: rgba(255,255,255,0.2); }
    .dd-trigger.open { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,127,255,0.15); }
    .dd-inner { display: flex; align-items: center; gap: 7px; min-width: 0; overflow: hidden; }
    .dd-inner > span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dd-arrow { font-size: 9px; color: var(--muted); transition: transform 0.18s; flex-shrink: 0; }
    .dd-trigger.open .dd-arrow { transform: rotate(180deg); }
    .dd-badge {
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 800;
      padding: 2px 6px; border-radius: 999px; flex-shrink: 0;
    }
    .dd-menu {
      position: absolute; top: calc(100% + 5px); left: 0; right: 0;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--rs); z-index: 500;
      max-height: 300px; display: flex; flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.55);
      animation: ddIn 0.13s ease;
    }
    @keyframes ddIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
    .dd-search-wrap { padding: 8px; border-bottom: 1px solid var(--border); }
    .dd-search {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border2);
      color: var(--text); border-radius: var(--rss);
      padding: 7px 10px; font: inherit; font-size: 12px;
    }
    .dd-search:focus { outline: none; border-color: var(--accent); }
    .dd-list { overflow-y: auto; flex: 1; padding: 4px; }
    .dd-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: var(--rss);
      cursor: pointer; font-size: 13px;
      transition: background 0.1s; user-select: none;
    }
    .dd-item:hover { background: rgba(255,255,255,0.05); }
    .dd-item.active { background: rgba(79,127,255,0.12); }
    .dd-item input { width: 13px; height: 13px; accent-color: var(--accent); cursor: pointer; margin: 0; flex-shrink: 0; pointer-events: none; }
    .color-dot { width: 13px; height: 13px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.18); flex-shrink: 0; }
    .dd-empty { padding: 16px 10px; font-size: 12px; color: var(--muted); text-align: center; }

    /* Msg */
    .msg { font-size: 12px; font-weight: 600; margin-top: 10px; min-height: 18px; line-height: 1.4; }
    .msg.ok  { color: var(--ok); }
    .msg.err { color: var(--err); }

    /* Runs */
    .runs-panel { position: sticky; top: 68px; max-height: calc(100vh - 84px); display: flex; flex-direction: column; }
    .runs-panel .panel { display: flex; flex-direction: column; max-height: calc(100vh - 84px); }
    .runs-body { overflow: auto; flex: 1; }

    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    thead th {
      position: sticky; top: 0; z-index: 2;
      background: var(--surface);
      text-align: left; padding: 10px 12px;
      font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted); border-bottom: 1px solid var(--border);
    }
    td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: 0; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    a { color: var(--accent); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }

    .status-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok      { background: var(--ok); }
    .dot-err     { background: var(--err); }
    .dot-running { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
    .dot-idle    { background: var(--muted); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
    .td-links { display: flex; flex-direction: column; gap: 3px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* Responsive */
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .runs-panel { position: static; max-height: none; }
      .runs-panel .panel { max-height: 420px; }
    }
    @media (max-width: 720px) {
      .areas-grid { grid-template-columns: repeat(3, 1fr); }
      .two-col    { grid-template-columns: 1fr; }
      .price-row  { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .areas-grid { grid-template-columns: repeat(2, 1fr); }
      .auth-card  { padding: 28px 20px; }
      .page       { padding: 14px 12px 28px; }
    }
    @media (max-width: 320px) { .areas-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-brand">
    <div class="nav-dot"></div>
    OLXify
    <span class="nav-pill">Lahore</span>
  </div>
  <div class="nav-right" id="navRight" style="display:none">
    <span class="nav-user" id="navUser"></span>
    <button class="btn btn-danger" onclick="logout()">Sign out</button>
  </div>
</nav>

<!-- Auth screen -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">O</div>
      <div class="auth-logo-name">OLXify</div>
    </div>
    <div class="auth-title">Sign in</div>
    <div class="auth-sub">Lahore Scraper Control Panel</div>
    <div class="field">
      <label class="field-label" for="username">Username</label>
      <input id="username" type="text" autocomplete="username" placeholder="admin" />
    </div>
    <div class="field">
      <label class="field-label" for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px;" id="loginBtn" onclick="login()">Continue</button>
    <div id="loginMsg" class="msg"></div>
  </div>
</div>

<!-- Main page -->
<div class="page" id="mainPage" style="display:none">
  <div class="layout">

    <!-- Left: Config -->
    <div>
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Scrape Configuration</div>
        </div>
        <div class="panel-body">

          <!-- Locations -->
          <div class="area-head">
            <div class="sec-label" style="margin:0">Locations</div>
            <div class="area-controls">
              <button class="btn btn-ghost" onclick="selectAllAreas(true)">All</button>
              <button class="btn btn-ghost" onclick="selectAllAreas(false)">None</button>
            </div>
          </div>
          <div id="areasGrid" class="areas-grid"></div>

          <div class="hr"></div>

          <!-- Price -->
          <div class="sec-label">Price Range (PKR)</div>
          <div class="price-row">
            <div class="field">
              <label class="field-label" for="priceMin">Min</label>
              <input id="priceMin" type="number" min="0" placeholder="e.g. 1,000,000" />
            </div>
            <div class="field">
              <label class="field-label" for="priceMax">Max</label>
              <input id="priceMax" type="number" min="0" placeholder="e.g. 5,000,000" />
            </div>
          </div>

          <div class="hr"></div>

          <!-- Brand + Colour -->
          <div class="two-col">
            <div>
              <div class="sec-label">Brand</div>
              <div class="dd-wrap" id="brandWrap">
                <button class="dd-trigger" id="brandTrigger" onclick="toggleDd('brand')">
                  <div class="dd-inner"><span id="brandLabel">Any Brand</span></div>
                  <span class="dd-arrow">&#9660;</span>
                </button>
                <div class="dd-menu" id="brandMenu" style="display:none">
                  <div class="dd-search-wrap">
                    <input class="dd-search" type="text" placeholder="Search brands…"
                           id="brandSearch" oninput="filterDd('brand')" />
                  </div>
                  <div class="dd-list" id="brandList"></div>
                </div>
              </div>
            </div>
            <div>
              <div class="sec-label">Exterior Colour</div>
              <div class="dd-wrap" id="colorWrap">
                <button class="dd-trigger" id="colorTrigger" onclick="toggleDd('color')">
                  <div class="dd-inner"><span id="colorLabel">Any Colour</span></div>
                  <span class="dd-arrow">&#9660;</span>
                </button>
                <div class="dd-menu" id="colorMenu" style="display:none">
                  <div class="dd-search-wrap">
                    <input class="dd-search" type="text" placeholder="Search colours…"
                           id="colorSearch" oninput="filterDd('color')" />
                  </div>
                  <div class="dd-list" id="colorList"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="hr"></div>

          <button class="btn-run" id="runBtn" onclick="runLahore()">Run Lahore Scrape</button>
          <div id="runMsg" class="msg"></div>

        </div>
      </div>
    </div>

    <!-- Right: Runs -->
    <div class="runs-panel">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Recent Runs</div>
          <button class="btn btn-ghost" onclick="loadRuns()">Refresh</button>
        </div>
        <div class="runs-body">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Status</th>
                <th>Links</th>
              </tr>
            </thead>
            <tbody id="runsTable"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const BRAND_OPTIONS = [
  ["Toyota","make_eq_toyota"],["Honda","make_eq_cars-honda"],["Suzuki","make_eq_cars-suzuki"],
  ["Nissan","make_eq_nissan"],["Daihatsu","make_eq_daihatsu"],["Hyundai","make_eq_hyundai"],
  ["Changan","make_eq_changan"],["KIA","make_eq_kia"],["MG","make_eq_mg"],
  ["Haval","make_eq_haval"],["Mercedes","make_eq_mercedes"],["Mitsubishi","make_eq_mitsubishi"],
  ["Proton","make_eq_proton"],["Prince","make_eq_prince"],["Subaru","make_eq_subaru"],
  ["Volkswagen","make_eq_volkswagen"],["DFSK","make_eq_dfsk"],["Audi","make_eq_audi"],
  ["Tesla","make_eq_tesla"],["FAW","make_eq_faw"],["Chevrolet","make_eq_chevrolet"],
  ["Isuzu","make_eq_cars-isuzu"],["BMW","make_eq_bmw"],["Chery","make_eq_chery"],
  ["Peugeot","make_eq_peugeot"],["JAC","make_eq_jac"],["Ford","make_eq_ford"],
  ["Range Rover","make_eq_range-rover"],["JW Forland","make_eq_jw-fortland"],
  ["Jaecoo","make_eq_jaecoo"],["Mazda","make_eq_mazda"],["United","make_eq_united"],
  ["BYD","make_eq_byd"],["Lexus","make_eq_lexus"],["Datsun","make_eq_datsun"],
  ["BAIC","make_eq_baic"],["Daewoo","make_eq_daewoo"],["Land Rover","make_eq_land-rover"],
  ["Deepal","make_eq_deepal"],["Jeep","make_eq_jeep"],["Fiat","make_eq_fiat"],
  ["Ssangyong","make_eq_ssangyong"],["Jetour","make_eq_jetour"],["Porsche","make_eq_porsche"],
  ["Cadillac","make_eq_cadillac"],["Seres","make_eq_seres"],["Dongfeng","make_eq_dongfeng"],
  ["Other Brands","make_eq_cars-other"],
];

const COLOR_OPTIONS = [
  ["White","color_eq_white","#f0f0f0"],["Silver","color_eq_silver","#b0b4bc"],
  ["Black","color_eq_black","#202020"],["Grey","color_eq_grey","#7a7e88"],
  ["Blue","color_eq_blue","#2c6ec8"],["Red","color_eq_red","#d93040"],
  ["Maroon","color_eq_maroon","#7a1020"],["Beige","color_eq_beige","#c8b490"],
  ["Green","color_eq_green","#2a8830"],["Brown","color_eq_brown","#7a3e18"],
  ["Gold","color_eq_gold","#c8a028"],["Indigo","color_eq_indigo","#3c1880"],
  ["Purple","color_eq_purple","#7c28cc"],["Yellow","color_eq_yellow","#e8bc30"],
  ["Turquoise","color_eq_turquoise","#38c0c0"],["Bronze","color_eq_bronze","#9c5c28"],
  ["Burgundy","color_eq_burgundy","#6c1830"],["Magenta","color_eq_magenta","#c02880"],
  ["Navy","color_eq_navy","#0c1e58"],["Orange","color_eq_orange","#dc5800"],
  ["Pink","color_eq_pink","#e078a8"],["Unlisted","color_eq_unlisted","#3a3e48"],
];

let areaData = [];
let selectedBrand = null;
let selectedColors = new Set();

/* Areas */
function renderAreas() {
  document.getElementById("areasGrid").innerHTML = areaData.map(a =>
    '<label class="area-chip">'
    + '<input class="area-check" type="checkbox" value="' + a.key + '" checked />'
    + '<span>' + a.name + '</span>'
    + '</label>'
  ).join("");
}
function selectAllAreas(on) {
  document.querySelectorAll(".area-check").forEach(x => { x.checked = on; });
}
function areaSelection() {
  return Array.from(document.querySelectorAll(".area-check:checked")).map(x => x.value);
}

/* Dropdowns */
function renderBrandList(q) {
  q = (q || "").toLowerCase();
  var items = BRAND_OPTIONS.filter(function(x){ return !q || x[0].toLowerCase().includes(q); });
  var list = document.getElementById("brandList");
  if (!items.length) { list.innerHTML = '<div class="dd-empty">No brands match</div>'; return; }
  list.innerHTML = items.map(function(x){
    var active = selectedBrand === x[1];
    return '<div class="dd-item' + (active?" active":"") + '" onclick="pickBrand(\'' + x[1] + '\',\'' + x[0].replace(/'/g,"\\'") + '\')">'
      + '<input type="radio" name="brand_r"' + (active?" checked":"") + ' tabindex="-1" />'
      + '<span>' + x[0] + '</span>'
      + '</div>';
  }).join("");
}
function pickBrand(token, name) {
  selectedBrand = (selectedBrand === token) ? null : token;
  document.getElementById("brandLabel").textContent = selectedBrand ? name : "Any Brand";
  closeDd("brand");
}

function renderColorList(q) {
  q = (q || "").toLowerCase();
  var items = COLOR_OPTIONS.filter(function(x){ return !q || x[0].toLowerCase().includes(q); });
  var list = document.getElementById("colorList");
  if (!items.length) { list.innerHTML = '<div class="dd-empty">No colours match</div>'; return; }
  list.innerHTML = items.map(function(x){
    var active = selectedColors.has(x[1]);
    return '<div class="dd-item' + (active?" active":"") + '" onclick="toggleColor(\'' + x[1] + '\')">'
      + '<input type="checkbox"' + (active?" checked":"") + ' tabindex="-1" />'
      + '<span class="color-dot" style="background:' + x[2] + '"></span>'
      + '<span>' + x[0] + '</span>'
      + '</div>';
  }).join("");
  updateColorLabel();
}
function toggleColor(token) {
  selectedColors.has(token) ? selectedColors.delete(token) : selectedColors.add(token);
  renderColorList(document.getElementById("colorSearch").value);
}
function updateColorLabel() {
  var n = selectedColors.size;
  var lbl = n === 0 ? "Any Colour"
    : n === 1 ? (COLOR_OPTIONS.find(function(c){ return selectedColors.has(c[1]); }) || ["1 Colour"])[0]
    : n + " Colours";
  document.getElementById("colorLabel").textContent = lbl;
  var trigger = document.getElementById("colorTrigger");
  var old = trigger.querySelector(".dd-badge");
  if (old) old.remove();
  if (n > 1) {
    var b = document.createElement("span");
    b.className = "dd-badge"; b.textContent = n;
    trigger.querySelector(".dd-inner").appendChild(b);
  }
}

function toggleDd(which) {
  var menuId   = which === "brand" ? "brandMenu"   : "colorMenu";
  var trigId   = which === "brand" ? "brandTrigger": "colorTrigger";
  var menu     = document.getElementById(menuId);
  var isOpen   = menu.style.display !== "none";
  closeDd("brand"); closeDd("color");
  if (!isOpen) {
    menu.style.display = "flex";
    document.getElementById(trigId).classList.add("open");
    if (which === "brand") { renderBrandList(); setTimeout(function(){ document.getElementById("brandSearch").focus(); }, 40); }
    else                   { renderColorList(); setTimeout(function(){ document.getElementById("colorSearch").focus(); }, 40); }
  }
}
function closeDd(which) {
  document.getElementById(which === "brand" ? "brandMenu"   : "colorMenu").style.display = "none";
  document.getElementById(which === "brand" ? "brandTrigger": "colorTrigger").classList.remove("open");
}
function filterDd(which) {
  var q = document.getElementById(which === "brand" ? "brandSearch" : "colorSearch").value;
  which === "brand" ? renderBrandList(q) : renderColorList(q);
}
document.addEventListener("click", function(e) {
  if (!e.target.closest("#brandWrap")) closeDd("brand");
  if (!e.target.closest("#colorWrap")) closeDd("color");
});

/* Filter tokens */
function buildFilterTokens() {
  var tokens = [];
  var pMin = document.getElementById("priceMin").value.trim();
  var pMax = document.getElementById("priceMax").value.trim();
  if (pMin) tokens.push("price_min_" + pMin);
  if (pMax) tokens.push("price_max_" + pMax);
  if (selectedBrand) tokens.push(selectedBrand);
  if (selectedColors.size) {
    var vals = Array.from(selectedColors).map(function(t){ return t.replace("color_eq_",""); });
    tokens.push("color_eq_" + vals.join("_and_"));
  }
  return tokens.join(",");
}

/* Auth / API */
function setMsg(id, text, ok) {
  var el = document.getElementById(id);
  el.textContent = text || "";
  el.className = "msg" + (text ? (ok ? " ok" : " err") : "");
}

async function login() {
  setMsg("loginMsg","",false);
  var btn = document.getElementById("loginBtn");
  btn.disabled = true; btn.textContent = "Signing in…";
  try {
    var r = await fetch("/api/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
      }),
    });
    var d = await r.json();
    if (!r.ok) { setMsg("loginMsg", d.error || "Login failed", false); return; }
    await initSession();
  } catch(err) { setMsg("loginMsg", String(err), false); }
  finally { btn.disabled = false; btn.textContent = "Continue"; }
}

async function logout() {
  await fetch("/api/logout", {method:"POST"});
  document.getElementById("mainPage").style.display   = "none";
  document.getElementById("authScreen").style.display = "flex";
  document.getElementById("navRight").style.display   = "none";
}

async function initSession() {
  var r = await fetch("/api/me");
  if (!r.ok) {
    document.getElementById("authScreen").style.display = "flex";
    document.getElementById("mainPage").style.display   = "none";
    return;
  }
  var d = await r.json();
  areaData = d.lahoreAreas || [];
  renderAreas();
  document.getElementById("navUser").textContent      = d.username;
  document.getElementById("navRight").style.display   = "flex";
  document.getElementById("authScreen").style.display = "none";
  document.getElementById("mainPage").style.display   = "block";
  await loadRuns();
}

async function runLahore() {
  setMsg("runMsg","",false);
  var areas = areaSelection();
  if (!areas.length) { setMsg("runMsg","Select at least one location.",false); return; }
  var btn = document.getElementById("runBtn");
  btn.disabled = true; btn.textContent = "Dispatching…";
  try {
    var r = await fetch("/api/run-lahore", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        areas: areas,
        maxPages: 2,
        maxListings: 15,
        filterTokens: buildFilterTokens(),
        customSearchUrl: "",
        githubToken: "",
      }),
    });
    var d = await r.json();
    if (!r.ok) { setMsg("runMsg", d.error || "Dispatch failed", false); return; }
    setMsg("runMsg", "✓ Dispatched — " + areas.length + " location(s)", true);
    setTimeout(loadRuns, 2800);
  } catch(err) { setMsg("runMsg", String(err), false); }
  finally { btn.disabled = false; btn.textContent = "Run Lahore Scrape"; }
}

/* Runs table */
function statusDot(status, conclusion) {
  var cls = "dot-idle", label = status || "-";
  if (conclusion === "success")      { cls = "dot-ok";      label = "success"; }
  else if (conclusion === "failure") { cls = "dot-err";     label = "failed";  }
  else if (status === "in_progress") { cls = "dot-running"; label = "running"; }
  else if (status === "queued")      { cls = "dot-idle";    label = "queued";  }
  return '<span class="status-dot"><span class="dot ' + cls + '"></span>' + label + '</span>';
}

async function loadRuns() {
  var tbody = document.getElementById("runsTable");
  tbody.innerHTML = '<tr><td colspan="3" style="color:var(--muted);text-align:center;padding:20px;font-size:12px;">Loading…</td></tr>';
  try {
    var r = await fetch("/api/runs", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({githubToken:""}),
    });
    var d = await r.json();
    if (!r.ok) {
      tbody.innerHTML = '<tr><td colspan="3" style="color:var(--err);padding:12px;">' + (d.error||"Error") + '</td></tr>';
      return;
    }
    var runs = d.runs || [];
    if (!runs.length) {
      tbody.innerHTML = '<tr><td colspan="3" style="color:var(--muted);text-align:center;padding:20px;font-size:12px;">No runs yet</td></tr>';
      return;
    }
    tbody.innerHTML = runs.map(function(run) {
      var dt = new Date(run.created_at);
      var time = dt.toLocaleDateString(undefined,{month:"short",day:"numeric"})
               + " " + dt.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
      var links = ['<a href="' + run.html_url + '" target="_blank" rel="noopener noreferrer">GitHub &#8599;</a>'];
      if (run.xlsx_available && run.xlsx_download_url) {
        links.push('<a href="' + run.xlsx_download_url + '">XLSX</a>');
      }
      return '<tr>'
        + '<td style="white-space:nowrap;color:var(--muted2);font-size:11.5px;">' + time + '</td>'
        + '<td>' + statusDot(run.status, run.conclusion) + '</td>'
        + '<td><div class="td-links">' + links.join("") + '</div></td>'
        + '</tr>';
    }).join("");
  } catch(err) {
    tbody.innerHTML = '<tr><td colspan="3" style="color:var(--err);padding:12px;">' + String(err) + '</td></tr>';
  }
}

initSession();
</script>
</body>
